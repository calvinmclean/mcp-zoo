      required: true
      sensitive: true
      secretBinding:
        name: reflect-mcp-creds
        key: reflect_npx_tag_2
  toolPreview:
    - name: reflect
      description: Returns argv, env, cwd, pid, transport, and (for HTTP) request headers.
