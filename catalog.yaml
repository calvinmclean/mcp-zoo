          --from-literal=reflect_npx_tag='hello-from-the-vault'

    After install, call `reflect` and check `argv` — you should see
    `--reflect-tag=hello-from-the-vault`. Obot never sees the value.

    `required: true` matters here for two reasons:
      1. The obot validator requires it because the env is templated.
      2. With `required: false` and a missing Secret/key, kubelet would
         start the pod with the env unset, nanobot's `envvar.ReplaceString`
