      - hello-from-bound-template
  env:
    - key: REFLECT_BOUND_TAG_1
      name: Reflect Bound Tag (Kubernetes Secret-bound)
      description: |
        Bound to a key in a pre-existing K8s Secret. Required=true so the
        pod fails closed at startup if the Secret/key is missing, AND so
        the obot template-reference validator accepts it.
      required: true
      sensitive: true
      secretBinding:
        name: reflect-mcp-creds
        key: reflect_npx_tag_1
    - key: REFLECT_BOUND_TAG_2
      name: Reflect Bound Tag (Kubernetes Secret-bound)
      description: |
        Bound to a key in a pre-existing K8s Secret. Required=true so the
